<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2ed;
    --surface: #fdfbf8;
    --border: #e8e3db;
    --border-strong: #d4cdc3;
    --text: #1a1916;
    --text-muted: #6b6963;
    --text-faint: #a09d97;
    --accent: #1a1916;
    --green: #2d6a3f;
    --green-bg: #eaf3ed;
    --amber: #8a5c00;
    --amber-bg: #fef8ec;
    --red: #8a2a2a;
    --red-bg: #fdf0f0;
    --blue: #24507f;
    --blue-bg: #eef2f8;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-left h1 { font-size: 17px; font-weight: 600; }
  .header-left .header-sub { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
  .header-left a { font-size: 13px; color: var(--text-muted); text-decoration: none; }
  .header-left a:hover { color: var(--text); }
  .header-right { display: flex; gap: 8px; align-items: center; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); font-family: inherit; transition: background 0.1s; }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #333; border-color: #333; }
  .btn-sm { padding: 5px 10px; font-size: 13px; }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger { color: var(--red); border-color: transparent; background: transparent; }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-back { color: var(--text-muted); border-color: transparent; background: transparent; font-size: 14px; }
  .btn-back:hover { color: var(--text); background: var(--bg); }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* OVERSIKT */
  .oversikt-top { padding: 1.5rem 2rem 0; }
  .total-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
  .total-card-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); margin-bottom: 1rem; }
  .total-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
  .total-item { background: var(--bg); border-radius: var(--radius-sm); padding: 0.7rem 0.9rem; }
  .total-item label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); display: block; margin-bottom: 3px; }
  .total-item span { font-size: 18px; font-weight: 600; }

  .bulk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; padding: 0 2rem 2rem; }
  .bulk-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; cursor: pointer; transition: box-shadow 0.15s; }
  .bulk-card:hover { box-shadow: 0 2px 14px rgba(0,0,0,0.08); border-color: var(--border-strong); }
  .bulk-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .bulk-card h3 { font-size: 15px; font-weight: 600; }
  .bulk-card .bulk-dato { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
  .bulk-arrow { color: var(--text-faint); font-size: 18px; }
  .bulk-stat { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
  .bulk-stat:last-child { border-bottom: none; }
  .bulk-stat-label { color: var(--text-muted); }
  .bulk-stat-val { font-weight: 500; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }

  /* LAGER (bulk detail) */
  .lager-header { padding: 1rem 2rem; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .lager-title { font-size: 16px; font-weight: 600; }
  .lager-sub { font-size: 12px; color: var(--text-faint); margin-top: 1px; }

  .summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .summary-item { background: var(--surface); padding: 0.85rem 1.25rem; }
  .summary-item label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); display: block; margin-bottom: 3px; }
  .summary-item span { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .green-text { color: var(--green); }
  .red-text { color: var(--red); }

  .toolbar { padding: 0.85rem 2rem; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; font-size: 13px; border: 1px solid var(--border-strong); background: var(--bg); cursor: pointer; color: var(--text-muted); font-family: inherit; transition: all 0.1s; }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; padding: 1.25rem 2rem 2rem; }
  .plagg-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); transition: box-shadow 0.15s; }
  .plagg-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .card-body { padding: 13px 14px 11px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 9px; }
  .card-name { font-weight: 600; font-size: 15px; }
  .card-meta { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .status-badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .status-salgs { background: var(--green-bg); color: var(--green); }
  .status-reservert { background: var(--amber-bg); color: var(--amber); }
  .status-solgt { background: var(--red-bg); color: var(--red); }
  .status-vei { background: var(--blue-bg); color: var(--blue); }
  .blue-text { color: var(--blue); }
  .muted-text { color: var(--text-muted); }
  .card-prices { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0; }
  .price-box { background: var(--bg); border-radius: var(--radius-sm); padding: 7px 10px; }
  .price-box label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); display: block; }
  .price-box span { font-size: 15px; font-weight: 600; }
  .profitt-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-muted); margin-top: 6px; padding-top: 8px; border-top: 1px solid var(--border); }
  .profitt-val { font-weight: 600; font-size: 14px; }
  .card-actions { display: flex; gap: 4px; margin-top: 9px; align-items: center; }
  .tise-link { font-size: 12px; color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 3px; padding: 5px 8px; border-radius: var(--radius-sm); }
  .tise-link:hover { background: var(--bg); color: var(--text); }

  .empty-state { grid-column: 1/-1; text-align: center; padding: 3rem 2rem; color: var(--text-muted); font-size: 14px; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 1.5rem; }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 5px; }
  .form-group input, .form-group select { width: 100%; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface); color: var(--text); font-family: inherit; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .error-msg { color: var(--red); font-size: 13px; margin-top: 6px; display: none; }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    .oversikt-top { padding: 1rem 1rem 0; }
    .bulk-grid { padding: 0 1rem 1.5rem; }
    .grid { padding: 1rem 1rem 1.5rem; gap: 10px; }
    .toolbar { padding: 0.75rem 1rem; }
    .summary-item { padding: 0.75rem 1rem; }
    .lager-header { padding: 1rem; }
  }
</style>
</head>

<header>
  <div class="header-left">
    <img id="header-img" src="" alt="Jahoen" style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:1.5px solid var(--border);">
    <div>
      <h1 id="header-title">Jahoen</h1>
      <div style="display:flex; align-items:center; gap:8px;">
        <a href="https://tise.com/jaho1" target="_blank">tise.com/jaho1 ↗</a>
        <span style="color:var(--border-strong);">·</span>
        <span class="header-sub" id="header-sub"></span>
      </div>
    </div>
  </div>
  <div class="header-right" id="header-right">

      <div class="total-card-label">Totalt — alle bulker</div>
      <div class="total-grid" id="total-grid"></div>

<!-- Legg til / rediger plagg -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Legg til plagg</h2>
    <div class="form-group">
      <label>Navn / beskrivelse</label>
      <input type="text" id="f-navn" placeholder="f.eks. Gaastra Piquer Blå M">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Type</label>
        <select id="f-type">
          <option value="Piquer">Piquer</option>
          <option value="Skjorte">Skjorte</option>
          <option value="Bukse">Bukse</option>
          <option value="Jakke">Jakke</option>
          <option value="Annet">Annet</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="på vei">På vei</option>
          <option value="til salgs">Til salgs</option>
          <option value="reservert">Reservert</option>
          <option value="solgt">Solgt</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Innkjøpspris (kr)</label>
        <input type="number" id="f-kost" placeholder="139" min="0" step="1">
      </div>
      <div class="form-group">
        <label>Tise-pris (kr)</label>
        <input type="number" id="f-salg" placeholder="650" min="0" step="1">
      </div>
    </div>
    <div class="form-group">
      <label>Solgt for (kr) — la stå tom hvis full pris</label>
      <input type="number" id="f-solgt" placeholder="Faktisk salgssum" min="0" step="1">
    </div>
    <div class="form-group">
      <label>Tise-lenke</label>
      <input type="text" id="f-link" placeholder="https://tise.com/...">
    </div>
    <div class="form-group">
      <label>Notater (valgfritt)</label>
      <input type="text" id="f-notat" placeholder="f.eks. størrelse L, liten flekk">
    </div>
    <div class="error-msg" id="errorMsg">Fyll inn navn på plagget.</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Avbryt</button>
      <button class="btn btn-danger btn-sm" id="slettBtn" onclick="slettAktivt()" style="display:none; margin-right:auto;">Slett</button>
      <button class="btn btn-primary" onclick="savePlagg()">Lagre</button>
    </div>
  </div>
</div>

<!-- Rediger bulk -->
<div class="modal-overlay" id="editBulkModalOverlay">

      <button class="btn" onclick="closeEditBulk()">Avbryt</button>
      <button class="btn btn-primary" onclick="saveEditBulk()">Lagre</button>
    </div>
  </div>
</div>

document.getElementById('header-img').src = PROFILE_IMG ? 'data:image/png;base64,' + PROFILE_IMG : '';

let plagg = JSON.parse(localStorage.getItem('tise-plagg') || '[]');
let bulker = JSON.parse(localStorage.getItem('tise-bulker') || '[]');
let editId = null;
let currentFilter = 'alle';
let aktivBulkId = null;

if (bulker.length === 0) {
  bulker.push({ id: 1, navn: 'Gaastra bulk 1 — Tyskland', dato: '2025-06-01', kost: 4442 });
  saveData();
}

function saveData() {
  localStorage.setItem('tise-plagg', JSON.stringify(plagg));
  localStorage.setItem('tise-bulker', JSON.stringify(bulker));
}

function fmt(n) { return Math.round(n).toLocaleString('nb-NO') + ' kr'; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function goBack() {
  aktivBulkId = null;
  currentFilter = 'alle';
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  showPage('oversikt');
  renderOversikt();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

function openBulk(id) {
  aktivBulkId = id;
  currentFilter = 'alle';
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  const b = bulker.find(x => x.id === id);
  document.getElementById('lager-title').textContent = b.navn;
  document.getElementById('lager-sub').textContent = b.dato ? new Date(b.dato).toLocaleDateString('nb-NO') : '';
  showPage('lager');
  renderLager();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderLager();
}

function statusBadge(s) {
  const cls = { 'på vei':'status-vei', 'til salgs':'status-salgs', 'reservert':'status-reservert', 'solgt':'status-solgt' };
  const lbl = { 'på vei':'På vei', 'til salgs':'Til salgs', 'reservert':'Reservert', 'solgt':'Solgt' };
  return '<span class="status-badge ' + (cls[s]||'') + '">' + (lbl[s]||s) + '</span>';
}

// Faktisk salgssum for solgte plagg (faller tilbake på Tise-pris hvis 'solgt for' ikke er fylt inn)
function inntektAv(p) { return (p.solgtFor && p.solgtFor > 0) ? p.solgtFor : (p.salg || 0); }
// Forventet inntekt = Tise-pris på alt som ikke er solgt ennå (på vei + til salgs + reservert)
function forventetAv(liste) { return liste.filter(p => p.status !== 'solgt').reduce((s,p) => s + (p.salg||0), 0); }

function renderOversikt() {
  const allSolgt = plagg.filter(p => p.status === 'solgt');
  const totalInv = bulker.reduce((s,b) => s + (b.kost||0), 0);
  const totalInntekt = allSolgt.reduce((s,p) => s + inntektAv(p), 0);
  const totalKost = allSolgt.reduce((s,p) => s + (p.kost||0), 0);
  const totalProfitt = totalInntekt - totalKost;
  const totalForventet = forventetAv(plagg);
  const totalForvProfitt = totalInntekt + totalForventet - totalInv;

  document.getElementById('header-sub').textContent = bulker.length + ' bulk' + (bulker.length !== 1 ? 'er' : '') + ' · ' + plagg.length + ' plagg';

  document.getElementById('total-grid').innerHTML = [
    ['Bulker', bulker.length, ''],
    ['Plagg', plagg.length, ''],
    ['Solgt', allSolgt.length + ' / ' + plagg.length, ''],
    ['Investert', fmt(totalInv), ''],
    ['Inntekt', fmt(totalInntekt), 'color:var(--green)'],
    ['Forventet igjen', fmt(totalForventet), 'color:var(--text-muted)'],
    ['Profitt (nå)', fmt(totalProfitt), 'color:' + (totalProfitt >= 0 ? 'var(--green)' : 'var(--red)')],
    ['Forv. total profitt', fmt(totalForvProfitt), 'color:' + (totalForvProfitt >= 0 ? 'var(--green)' : 'var(--red)')],
  ].map(([lbl, val, style]) =>
    '<div class="total-item"><label>' + lbl + '</label><span style="' + style + '">' + val + '</span></div>'
  ).join('');

  const grid = document.getElementById('bulk-grid');
  if (bulker.length === 0) {
    grid.innerHTML = '<div style="color:var(--text-muted); font-size:14px; padding:1rem;">Ingen bulker ennå.</div>';
    return;
  }
  grid.innerHTML = bulker.map(b => {
    const bp = plagg.filter(p => p.bulkId === b.id);
    const bs = bp.filter(p => p.status === 'solgt');
    const bvei = bp.filter(p => p.status === 'på vei');
    const inntekt = bs.reduce((s,p) => s + inntektAv(p), 0);
    const kostS = bs.reduce((s,p) => s + (p.kost||0), 0);
    const profitt = inntekt - kostS;
    const forventet = forventetAv(bp);
    const forvProfitt = inntekt + forventet - (b.kost||0);
    const dato = b.dato ? new Date(b.dato).toLocaleDateString('nb-NO') : '—';
    return '<div class="bulk-card" onclick="openBulk(' + b.id + ')">' +
      '<div class="bulk-card-top"><div><h3>' + b.navn + '</h3><div class="bulk-dato">' + dato + '</div></div>' +
      '<div style="display:flex; gap:6px; align-items:center;"><button class="btn btn-sm btn-ghost" style="font-size:12px; padding:3px 8px;" onclick="event.stopPropagation(); openEditBulk(' + b.id + ')">Rediger</button><span class="bulk-arrow">›</span></div></div>' +
      '<div class="bulk-stat"><span class="bulk-stat-label">Investert</span><span class="bulk-stat-val">' + fmt(b.kost||0) + '</span></div>' +
      '<div class="bulk-stat"><span class="bulk-stat-label">Plagg</span><span class="bulk-stat-val">' + bp.length + ' stk</span></div>' +
      (bvei.length ? '<div class="bulk-stat"><span class="bulk-stat-label">På vei</span><span class="bulk-stat-val" style="color:var(--blue)">' + bvei.length + ' stk</span></div>' : '') +
      '<div class="bulk-stat"><span class="bulk-stat-label">Solgt</span><span class="bulk-stat-val">' + bs.length + ' av ' + bp.length + '</span></div>' +
      '<div class="bulk-stat"><span class="bulk-stat-label">Inntekt</span><span class="bulk-stat-val pos">' + fmt(inntekt) + '</span></div>' +
      '<div class="bulk-stat"><span class="bulk-stat-label">Forventet igjen</span><span class="bulk-stat-val" style="color:var(--text-muted)">' + fmt(forventet) + '</span></div>' +
      '<div class="bulk-stat"><span class="bulk-stat-label">Profitt (nå)</span><span class="bulk-stat-val ' + (profitt >= 0 ? 'pos' : 'neg') + '">' + fmt(profitt) + '</span></div>' +
      '<div class="bulk-stat"><span class="bulk-stat-label">Forv. total profitt</span><span class="bulk-stat-val ' + (forvProfitt >= 0 ? 'pos' : 'neg') + '">' + fmt(forvProfitt) + '</span></div>' +
    '</div>';
  }).join('');
}

function renderLager() {
  const bp = plagg.filter(p => p.bulkId === aktivBulkId);
  const filtered = currentFilter === 'alle' ? bp : bp.filter(p => p.status === currentFilter);

  const solgt = bp.filter(p => p.status === 'solgt');
  const inntekt = solgt.reduce((s,p) => s + inntektAv(p), 0);
  const kostS = solgt.reduce((s,p) => s + (p.kost||0), 0);
  const profitt = inntekt - kostS;
  const investert = bp.reduce((s,p) => s + (p.kost||0), 0);
  const forventet = forventetAv(bp);
  const forvProfitt = inntekt + forventet - investert;

  document.getElementById('sum-total').textContent = bp.length;
  document.getElementById('sum-vei').textContent = bp.filter(p => p.status === 'på vei').length;
  document.getElementById('sum-salgs').textContent = bp.filter(p => p.status === 'til salgs').length;
  document.getElementById('sum-solgt').textContent = solgt.length;
  document.getElementById('sum-investert').textContent = fmt(investert);
  document.getElementById('sum-inntekt').textContent = fmt(inntekt);
  document.getElementById('sum-forventet').textContent = fmt(forventet);
  document.getElementById('sum-profitt').textContent = fmt(profitt);
  document.getElementById('sum-profitt').className = profitt >= 0 ? 'green-text' : 'red-text';
  document.getElementById('sum-forv-profitt').textContent = fmt(forvProfitt);
  document.getElementById('sum-forv-profitt').className = forvProfitt >= 0 ? 'green-text' : 'red-text';

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">' + (bp.length === 0 ? 'Ingen plagg ennå. Trykk + Legg til plagg.' : 'Ingen plagg med denne statusen.') + '</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const erSolgt = p.status === 'solgt';
    const sum = erSolgt ? inntektAv(p) : (p.salg||0);
    const profittP = sum - (p.kost||0);
    const prisLabel = erSolgt ? 'Solgt for' : 'Tise-pris';
    const profittLabel = erSolgt ? 'Profitt' : 'Forventet profitt';
    const linkHtml = p.link ? '<a class="tise-link" href="' + p.link + '" target="_blank">↗ Tise</a>' : '';
    const notat = p.notat ? '<div style="font-size:12px; color:var(--text-faint); margin-top:3px;">' + p.notat + '</div>' : '';
    return '<div class="plagg-card"><div class="card-body">' +
      '<div class="card-top"><div><div class="card-name">' + (p.navn||p.type) + '</div><div class="card-meta">#' + p.id + ' · ' + p.type + '</div>' + notat + '</div>' + statusBadge(p.status) + '</div>' +
      '<div class="card-prices"><div class="price-box"><label>Innkjøp</label><span>' + fmt(p.kost||0) + '</span></div><div class="price-box"><label>' + prisLabel + '</label><span>' + fmt(sum) + '</span></div></div>' +
      '<div class="profitt-row"><span>' + profittLabel + '</span><span class="profitt-val ' + (profittP >= 0 ? 'pos' : 'neg') + '">' + fmt(profittP) + '</span></div>' +
      '<div class="card-actions">' + linkHtml + '<button class="btn btn-sm btn-ghost" style="margin-left:auto;" onclick="openModal(' + p.id + ')">Rediger</button></div>' +
    '</div></div>';
  }).join('');
}

// Plagg modal
function openModal(id) {
  editId = id !== undefined ? id : null;
  document.getElementById('errorMsg').style.display = 'none';
  if (editId !== null) {
    const p = plagg.find(x => x.id === editId);
    document.getElementById('modalTitle').textContent = 'Rediger plagg';
    document.getElementById('f-navn').value = p.navn || '';
    document.getElementById('f-type').value = p.type || 'Piquer';
    document.getElementById('f-status').value = p.status || 'til salgs';
    document.getElementById('f-kost').value = p.kost || '';
    document.getElementById('f-salg').value = p.salg || '';
    document.getElementById('f-solgt').value = p.solgtFor || '';
    document.getElementById('f-link').value = p.link || '';
    document.getElementById('f-notat').value = p.notat || '';
    document.getElementById('slettBtn').style.display = 'inline-flex';
  } else {
    document.getElementById('modalTitle').textContent = 'Legg til plagg';
    ['f-navn','f-kost','f-salg','f-solgt','f-link','f-notat'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-type').value = 'Piquer';
    document.getElementById('f-status').value = 'til salgs';
    document.getElementById('slettBtn').style.display = 'none';
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f-navn').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editId = null;
}

function savePlagg() {
  const navn = document.getElementById('f-navn').value.trim();
  if (!navn) { document.getElementById('errorMsg').style.display = 'block'; document.getElementById('f-navn').focus(); return; }
  document.getElementById('errorMsg').style.display = 'none';
  const data = {
    navn,
    type: document.getElementById('f-type').value,
    bulkId: aktivBulkId,
    kost: parseFloat(document.getElementById('f-kost').value) || 0,
    salg: parseFloat(document.getElementById('f-salg').value) || 0,
    solgtFor: parseFloat(document.getElementById('f-solgt').value) || 0,
    status: document.getElementById('f-status').value,
    link: document.getElementById('f-link').value.trim(),
    notat: document.getElementById('f-notat').value.trim(),
  };
  if (editId !== null) {
    const idx = plagg.findIndex(p => p.id === editId);
    plagg[idx] = { ...plagg[idx], ...data };
    showToast('Plagg oppdatert');
  } else {
    plagg.push({ id: Date.now(), ...data });
    showToast('Plagg lagt til');
  }
  saveData();
  renderLager();
  closeModal();
}

function slettAktivt() {
  if (editId === null) return;
  plagg = plagg.filter(p => p.id !== editId);
  saveData();
  renderLager();
  closeModal();
  showToast('Plagg slettet');
}

// Bulk modal
function openBulkModal() {
  document.getElementById('b-navn').value = '';
  document.getElementById('b-dato').value = new Date().toISOString().split('T')[0];
  document.getElementById('b-kost').value = '';
  document.getElementById('bulkErrorMsg').style.display = 'none';
  document.getElementById('bulkModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('b-navn').focus(), 100);
}

function closeBulkModal() {
  document.getElementById('bulkModalOverlay').classList.remove('open');
}

function saveBulk() {
  const navn = document.getElementById('b-navn').value.trim();
  if (!navn) { document.getElementById('bulkErrorMsg').style.display = 'block'; return; }
  bulker.push({ id: Date.now(), navn, dato: document.getElementById('b-dato').value, kost: parseFloat(document.getElementById('b-kost').value) || 0 });
  saveData();
  renderOversikt();
  closeBulkModal();
  showToast('Ny bulk opprettet');
}

function openEditBulk(id) {
  const b = bulker.find(x => x.id === id);
  if (!b) return;
  document.getElementById('editBulkModalOverlay').dataset.editId = id;
  document.getElementById('eb-navn').value = b.navn || '';
  document.getElementById('eb-dato').value = b.dato || '';
  document.getElementById('eb-kost').value = b.kost || '';
  document.getElementById('editBulkModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('eb-navn').focus(), 100);
}

function closeEditBulk() {
  document.getElementById('editBulkModalOverlay').classList.remove('open');
}

function saveEditBulk() {
  const overlay = document.getElementById('editBulkModalOverlay');
  const id = parseInt(overlay.dataset.editId);
  const navn = document.getElementById('eb-navn').value.trim();
  if (!navn) { document.getElementById('eb-navn').focus(); return; }
  const idx = bulker.findIndex(b => b.id === id);
  bulker[idx].navn = navn;
  bulker[idx].dato = document.getElementById('eb-dato').value;
  bulker[idx].kost = parseFloat(document.getElementById('eb-kost').value) || 0;
  saveData();
  renderOversikt();
  closeEditBulk();
  showToast('Bulk oppdatert');
}

// Close on backdrop
['modalOverlay','bulkModalOverlay','editBulkModalOverlay'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) { if (e.target === this) { closeModal(); closeBulkModal(); } });
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeBulkModal(); closeEditBulk(); } });

renderOversikt();
</script>

<script>
if ('serviceWorker' in navigator) {
  const swCode = `
self.addEventListener('install', e => e.waitUntil(
  caches.open('hoen-tise-v1').then(c => c.addAll(['.']))
));
self.addEventListener('fetch', e => e.respondWith(
  caches.match(e.request).then(r => r || fetch(e.request))
));`;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
</body>
